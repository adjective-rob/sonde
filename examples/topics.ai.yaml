topics:
  - id: "agent_security_model"
    name: "Agent Security Model"
    description: "Security models, permissions, identity, and threat models for AI agents."
    intent: "Track emerging work on identity, permissioning, isolation, and threat models for AI agents."
    status: "active"
    priority: "high"
    version: "1.0.0"
    owner: "adjective"
    queries:
      - "agent security model"
      - "AI agent permissioning"
      - "agent identity authorization"
    aliases:
      - "secure AI agents"
      - "agentic security"
    negative_terms:
      - "real estate agent"
      - "insurance agent"
    tags:
      - "ai"
      - "agents"
      - "security"
    sources:
      - id: "local_jsonl"
        enabled: true
        max_results: 10
        include:
          paths:
            - "examples/fixtures/local_records.jsonl"
      - id: "github"
        enabled: true
        max_results: 20
      - id: "arxiv"
        enabled: true
        max_results: 20
    schedule:
      interval_minutes: 120
    scoring:
      velocity_threshold: 3.0
      relevance_threshold: 0.70
      novelty_threshold: 0.35
    governance:
      created_at: "2026-04-28"
      last_reviewed_at: "2026-04-28"
      review_cycle_days: 30
      reviewers: []
    lineage:
      retain_config_hash: true
      retain_source_response_hash: true

